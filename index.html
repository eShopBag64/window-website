<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="description" content="Window - A changing window!">
  <meta name="keywords" content="bitview,video,sharing,altvid,youtube,clone,maintenance,service,upgrades,updates">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window - A changing Window!</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: white;
      color: black;
      font-family: sans-serif;
      font-size: 1em;
      background-image: linear-gradient(to bottom, #eee, white);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble {
      position: relative;
      margin: 2em auto;
      padding: 0.1em 1em;
      width: fit-content;
      border-radius: 0.5em;
      background-image: linear-gradient(to bottom, #f0f0f0 60%, #d9d9d9);
      filter: drop-shadow(0 0.2em 0.2em gray);
      
    h1 {
      display: block;
      font-size: 2em;
      margin-block-start: 0.83em;
      margin-block-end: 0.83em;
      margin-inline-start: 0px;
      margin-inline-end: 0px;
      font-weight: bold;
      unicode-bidi: isolate;
      text-align: center;
}

    h2 {
      display: block;
      font-size: 1.5em;
      margin-block-start: 0.67em;
      margin-block-end: 0.67em;
      margin-inline-start: 0px;
      margin-inline-end: 0px;
      font-weight: bold;
      unicode-bidi: isolate;
      color: #666;
      font-weight: normal;
      text-align: center;
}

    * {
      box-sixing: border-box:
    }

    footer {
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>
  <main>
    <div class="bubble">
      <h1>Welcome to the window website</h1>
      <h2>Here, this text on this window can turn into memes<br>or some other random things during an event!</h2>
    </div>
  </main>

  <footer>

  </footer>
</body>
</html>
